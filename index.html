<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chrono Arena RPG</title>
    <style>
        :root { 
            --boy: #00d2ff; --girl: #ff007f; --accent: #f1c40f; 
            --bg: #0a0b16; --card-bg: rgba(25, 28, 45, 0.95);
            --event: #ff9f43; --heal: #2ecc71; --info: #00ffcc; --dmg: #ff4d4d;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg); color: white; margin: 0; padding: 0;
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        .overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        #selection-screen { 
            position: absolute; inset: 0; background: var(--bg); z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; padding: 20px;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        .job-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 850px; padding-bottom: 40px; }
        
        .job-card { background: var(--card-bg); border: 2px solid #444; padding: 18px; border-radius: 20px; text-align: left; transition: 0.3s; }
        .job-card:active { border-color: var(--accent); transform: scale(0.98); }
        .job-card h3 { color: var(--accent); margin: 0 0 10px 0; font-size: 1.4rem; text-align: center; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .job-stats { font-size: 0.85rem; color: var(--info); margin-bottom: 12px; font-weight: bold; text-align: center; }
        .job-desc { font-size: 0.75rem; color: #bbb; line-height: 1.5; margin: 0; padding-left: 10px; list-style: none; }
        .job-desc li { margin-bottom: 6px; position: relative; }
        .job-desc li::before { content: "▸"; position: absolute; left: -12px; color: var(--accent); }
        .job-desc b { color: #fff; }

        .arena { display: none; width: 100%; height: 100%; padding: 10px; gap: 10px; }
        .card { flex: 1; background: var(--card-bg); border-radius: 20px; padding: 10px; display: flex; flex-direction: column; position: relative; border: 1px solid #333; overflow: hidden;}
        
        .hp-container { width: 100%; height: 22px; background: #000; border-radius: 10px; overflow: hidden; position: relative; margin: 3px 0; border: 1px solid #444; }
        .hp-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #ff4d4d, #f9ca24); transition: 0.3s; }
        .hp-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; text-shadow: 1px 1px 2px #000; }
        
        .status-icons { font-size: 0.65rem; color: var(--accent); height: 14px; text-align: center; font-weight: bold; }

        .en-row { display: flex; gap: 3px; justify-content: center; margin-bottom: 8px; }
        .en-dot { width: 10px; height: 10px; border-radius: 50%; background: #222; border: 1px solid #444; }
        .en-dot.active { background: var(--accent); box-shadow: 0 0 5px var(--accent); }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; flex-grow: 1; }
        button { 
            background: #2a2d3e; color: white; border: 1px solid #444; border-radius: 10px; 
            padding: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 60px; transition: filter 0.2s, opacity 0.2s;
        }
        button:active:not(:disabled) { background: #3d425e; transform: scale(0.97); }
        button:disabled { cursor: not-allowed; }
        
        .btn-ult { grid-column: span 2; background: linear-gradient(45deg, #4834d4, #686de0); border: 1px solid #a29bfe; min-height: 50px;}
        
        .sk-name { font-size: 0.75rem; font-weight: 800; color: #fff; margin-bottom: 1px; }
        .sk-cost { font-size: 0.65rem; color: var(--info); font-weight: bold; }
        .sk-val { font-size: 0.65rem; color: var(--dmg); font-weight: bold; }
        .sk-effect { font-size: 0.55rem; color: #aaa; text-align: center; line-height: 1; margin-top: 2px; }

        .dmg-float { position: absolute; font-weight: 900; pointer-events: none; animation: pop 0.8s ease-out forwards; z-index: 500; font-size: 2.2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        @keyframes pop { 0% { opacity: 0; transform: translateY(0) scale(0.5); } 20% { opacity: 1; transform: translateY(-20px) scale(1.1); } 100% { opacity: 0; transform: translateY(-100px) scale(1); } }

        @media (max-width: 768px) { .arena { flex-direction: column; } .job-grid { grid-template-columns: 1fr; } .card { height: 49.5%; } }
    </style>
</head>
<body>

    <div id="event-overlay" class="overlay">
        <div style="background: #1e272e; padding: 30px; border-radius: 30px; border: 4px solid var(--event); text-align: center; width: 85%; max-width: 450px;">
            <h2 id="ev-name" style="color: var(--event); margin: 0;"></h2>
            <p id="ev-desc" style="color: #bdc3c7; margin: 15px 0; font-size: 1.1rem;"></p>
            <button onclick="closeEvent()" style="width: 100%; min-height: 50px; background: var(--event); color: black; font-weight: bold; border-radius: 15px;">CONTINUE</button>
        </div>
    </div>

    <div id="win-overlay" class="overlay">
        <div style="text-align: center;">
            <h1 id="win-title" style="font-size: 4rem; color: var(--accent); margin:0;"></h1>
            <button onclick="location.reload()" style="padding: 15px 50px; border-radius: 50px; background: white; color: black; font-weight: bold;">REMATCH</button>
        </div>
    </div>

    <div id="selection-screen">
        <h1 style="color: var(--accent); margin-top: 20px;">CHRONO ARENA</h1>
        <p id="turn-title" style="color: var(--boy); font-weight: bold; margin-bottom: 20px;">BOY: SELECT YOUR CLASS</p>
        <div class="job-grid" id="job-list"></div>
    </div>

    <div class="arena" id="arena">
        <div id="card-boy" class="card">
            <h2 style="color:var(--boy); text-align:center; margin:0; font-size: 1.1rem;">BOY</h2>
            <div id="status-boy" class="status-icons"></div>
            <div class="hp-container"><div id="bar-boy" class="hp-fill"></div><div class="hp-text" id="txt-boy"></div></div>
            <div id="en-boy" class="en-row"></div>
            <div class="btn-grid" id="btns-boy"></div>
        </div>
        <div id="card-girl" class="card">
            <h2 style="color:var(--girl); text-align:center; margin:0; font-size: 1.1rem;">GIRL</h2>
            <div id="status-girl" class="status-icons"></div>
            <div class="hp-container"><div id="bar-girl" class="hp-fill"></div><div class="hp-text" id="txt-girl"></div></div>
            <div id="en-girl" class="en-row"></div>
            <div class="btn-grid" id="btns-girl"></div>
        </div>
    </div>

    <script>
        let selecting = 'boy', isOver = false;
        const state = {
            boy: { hp:0, max:0, en:0, job:'', def:0, stunned:false, guard:false, reflect:false, dodge:0, weakened:false, frost:false, focused:false, marked:false },
            girl: { hp:0, max:0, en:0, job:'', def:0, stunned:false, guard:false, reflect:false, dodge:0, weakened:false, frost:false, focused:false, marked:false }
        };

        const jobs = {
            Warrior: { hp: 160, def: 0.25, desc: [
                "<b>Passive: Iron Will</b> - Automatically gains 1 Energy whenever attacked.",
                "<b>Tanker</b>: Highest base HP and physical defense reduction.",
                "<b>Strategic</b>: Use 'Shield Bash' to stun and 'Iron Guard' to survive big hits."
            ], skills: [
                { n: "Strike", c: 0, d: [8, 12], e: "Physical dmg" },
                { n: "Charge", c: 0, v: 2, t: 'en', e: "+2 Energy" },
                { n: "Shield Bash", c: 1, d: [10, 14], t: 'stun', e: "20% Stun Chance" },
                { n: "War Cry", c: 2, t: 'weak', e: "Target next hit -50%" },
                { n: "Iron Guard", c: 1, t: 'def', e: "80% Block (1 Act)" },
                { n: "Recover", c: 2, v: [25, 40], t: 'heal', e: "Heal HP" },
                { n: "EARTHQUAKE", c: 9, d: [70, 95], e: "ULTIMATE" }
            ]},
            Mage: { hp: 95, def: 0, desc: [
                "<b>Passive: Mana Echo</b> - Energy recovery skills are more effective.",
                "<b>Controller</b>: 'Frostbite' forces enemy to spend double energy.",
                "<b>Mirror Feedback</b>: Reflects 100% of raw damage back to the attacker."
            ], skills: [
                { n: "Magic Bolt", c: 0, d: [10, 15], e: "Arcane dmg" },
                { n: "Meditate", c: 0, v: 3, t: 'en', e: "+3 Energy" },
                { n: "Life Siphon", c: 2, d: [18, 28], t: 'leech', e: "100% Lifesteal" },
                { n: "Frostbite", c: 2, t: 'frost', e: "Target next Cost x2" },
                { n: "Mirror Feedback", c: 2, t: 'reflect', e: "100% Damage Reflect" },
                { n: "Mana Burn", c: 2, t: 'burn', e: "Drain 2 Enemy EN" },
                { n: "METEOR", c: 9, d: [105, 130], e: "ULTIMATE" }
            ]},
            Berserker: { hp: 130, def: 0.1, desc: [
                "<b>Passive: Bloodlust</b> - 30% innate chance to deal 200% Critical damage.",
                "<b>Slayer</b>: 'Execute' deals massive damage if enemy HP is below 50%.",
                "<b>Burst</b>: 'Adrenaline' ensures your next hit is a guaranteed Critical."
            ], skills: [
                { n: "Heavy Slash", c: 0, d: [13, 19], e: "Brutal swing" },
                { n: "Blood Lust", c: 0, v: 2, t: 'en', e: "+2 Energy" },
                { n: "Adrenaline", c: 2, t: 'focus', e: "Next hit 100% Crit" },
                { n: "Frenzy", c: 3, d: [25, 38], t: 'leech', e: "50% Lifesteal" },
                { n: "Execute", c: 4, d: [30, 45], t: 'exec', e: "+50% dmg if HP < 50%" },
                { n: "Inner Rage", c: 1, v: [15, 25], t: 'heal', e: "Self Heal" },
                { n: "DECIMATE", c: 9, d: [95, 120], e: "ULTIMATE" }
            ]},
            Archer: { hp: 110, def: 0.15, desc: [
                "<b>Passive: Rapid Fire</b> - 100% chance to trigger a free second attack.",
                "<b>Agility</b>: Rely on 'Evasion' to completely dodge incoming strikes.",
                "<b>Marking</b>: Ignores enemy defense and blocks completely."
            ], skills: [
                { n: "Aim Shot", c: 0, d: [11, 15], e: "Pierce dmg" },
                { n: "Reload", c: 0, v: 2, t: 'en', e: "+2 Energy" },
                { n: "Quick Shot", c: 1, d: [10, 14], t: 'double', e: "Guaranteed Double Hit" },
                { n: "Mark Target", c: 2, t: 'mark', e: "Ignore Defense" },
                { n: "Evasion", c: 1, t: 'dodge', e: "80% Dodge (2 Turns)" },
                { n: "Volley", c: 3, d: [15, 22], t: 'triple', e: "100% Triple Strike" },
                { n: "ARROW RAIN", c: 9, d: [85, 110], e: "ULTIMATE" }
            ]}
        };

        function initSelection() {
            const list = document.getElementById('job-list');
            for(let j in jobs) {
                const card = document.createElement('div'); card.className = 'job-card';
                card.onclick = () => pick(j);
                let descHTML = jobs[j].desc.map(d => `<li>${d}</li>`).join('');
                card.innerHTML = `<h3>${j.toUpperCase()}</h3><div class="job-stats">HP: ${jobs[j].hp} | DEF: ${jobs[j].def*100}%</div><ul class="job-desc">${descHTML}</ul>`;
                list.appendChild(card);
            }
        }

        function pick(j) {
            state[selecting].job = j; state[selecting].max = jobs[j].hp; state[selecting].hp = jobs[j].hp; state[selecting].def = jobs[j].def;
            if(selecting === 'boy') { selecting = 'girl'; document.getElementById('turn-title').innerText = "GIRL: SELECT YOUR CLASS"; document.getElementById('turn-title').style.color = "var(--girl)"; }
            else { document.getElementById('selection-screen').style.display = 'none'; document.getElementById('arena').style.display = 'flex'; renderBtns(); update(); }
        }

        function renderBtns() {
            ['boy','girl'].forEach(p => {
                const box = document.getElementById(`btns-${p}`); box.innerHTML = '';
                jobs[state[p].job].skills.forEach((s, i) => {
                    const b = document.createElement('button'); if(i === 6) b.className = 'btn-ult'; b.id = `btn-${p}-${i}`;
                    b.onclick = () => act(p, i); box.appendChild(b);
                });
            });
        }

        function act(p, i) {
            if(isOver) return;
            if(state[p].stunned) {
                state[p].stunned = false; 
                pop(p, "STUNNED!", "var(--dmg)");
                update();
                return; 
            }
            const s = jobs[state[p].job].skills[i]; const opp = p === 'boy' ? 'girl' : 'boy';
            let cost = s.c; let consumedFrost = false;
            if(state[p].frost && cost > 0) { cost *= 2; consumedFrost = true; }
            if(state[p].en < cost) return;
            state[p].en -= cost;
            if(consumedFrost) state[p].frost = false;
            state[p].guard = false; state[p].reflect = false; 

            if(s.t === 'en') state[p].en = Math.min(10, state[p].en + s.v);
            else if(s.t === 'def') { state[p].guard = true; pop(p, "SHIELD", "var(--info)"); }
            else if(s.t === 'reflect') { state[p].reflect = true; pop(p, "MIRROR", "var(--info)"); }
            else if(s.t === 'dodge') { state[p].dodge = 2; pop(p, "READY", "var(--info)"); }
            else if(s.t === 'weak') { state[opp].weakened = true; pop(opp, "WEAKEN", "var(--accent)"); }
            else if(s.t === 'frost') { state[opp].frost = true; pop(opp, "FROST", "var(--info)"); }
            else if(s.t === 'focus') { state[p].focused = true; pop(p, "FOCUSED", "var(--accent)"); }
            else if(s.t === 'mark') { state[opp].marked = true; pop(opp, "MARKED", "var(--dmg)"); }
            else if(s.t === 'burn') { state[opp].en = Math.max(0, state[opp].en - 2); pop(opp, "-2 EN", "var(--boy)"); }
            else if(s.t === 'heal') { let h = r(s.v[0], s.v[1]); state[p].hp = Math.min(state[p].max, state[p].hp + h); pop(p, `+${h}`, 'var(--heal)'); }
            else {
                let hits = 1; if(s.t === 'double') hits = 2; if(s.t === 'triple') hits = 3;
                for(let h=0; h<hits; h++){
                    const delay = h * 180;
                    setTimeout(() => {
                        if(isOver) return;
                        if(state[opp].dodge > 0 && Math.random() < 0.8) { pop(opp, "MISS", "#3498db", h); } 
                        else {
                            let baseD = r(s.d[0], s.d[1]); 
                            if(s.t === 'exec' && state[opp].hp < (state[opp].max * 0.5)) baseD *= 1.5;
                            if(state[p].focused || Math.random() < (state[p].job==='Berserker'?0.3:0.12)) { baseD *= 2; state[p].focused = false; }
                            if(state[p].weakened) { baseD *= 0.5; state[p].weakened = false; }
                            let reduction = state[opp].marked ? 0 : state[opp].def;
                            if(state[opp].guard) reduction = 0.8;
                            if(state[opp].reflect) {
                                state[p].hp -= baseD; pop(p, `-${Math.floor(baseD)}`, "var(--dmg)", h);
                                pop(opp, "REFLECT", "var(--info)", h); reduction = 0.5;
                            }
                            let f = Math.max(1, Math.floor(baseD * (1 - reduction)));
                            state[opp].hp -= f; pop(opp, `-${f}`, "var(--dmg)", h);
                            if(s.t === 'leech') {
                                let healAmt = state[p].job === 'Mage' ? f : Math.floor(f*0.5);
                                state[p].hp = Math.min(state[p].max, state[p].hp + healAmt);
                                pop(p, `+${healAmt}`, "var(--heal)", h);
                            }
                            if(s.t === 'stun' && Math.random() < (s.n==='Shield Bash'?0.2:0.4)) { state[opp].stunned = true; }
                            if(state[opp].job === 'Warrior') state[opp].en = Math.min(10, state[opp].en + 1);
                        }
                        update(); checkWin();
                    }, delay);
                }
                if(state[opp].dodge > 0) state[opp].dodge--; state[opp].marked = false;
            }
            update(); if(!checkWin() && Math.random() < 0.05) triggerEvent(p);
        }

        function triggerEvent(p) {
            const evs = [{ n: "DANCING FEVER!", d: "+2 EN and Extra Turn!", f: () => { state[p].en = Math.min(10, state[p].en + 2); }}];
            const e = evs[0]; document.getElementById('ev-name').innerText = e.n; document.getElementById('ev-desc').innerText = e.d; 
            e.f(); document.getElementById('event-overlay').style.display = 'flex';
        }

        function closeEvent() { document.getElementById('event-overlay').style.display = 'none'; update(); checkWin(); }

        function update() {
            ['boy','girl'].forEach(p => {
                const s = state[p]; s.hp = Math.max(0, Math.min(s.max, s.hp)); 
                document.getElementById(`txt-${p}`).innerText = `${Math.floor(s.hp)}/${s.max}`;
                document.getElementById(`bar-${p}`).style.width = (s.hp/s.max*100) + "%";
                
                let st = "";
                if(s.guard) st += "🛡️GUARD "; if(s.reflect) st += "✨REFLECT ";
                if(s.dodge > 0) st += `💨EVADE(${s.dodge}) `;
                if(s.weakened) st += "📉WEAK "; if(s.frost) st += "❄️FROST ";
                if(s.focused) st += "🔥FOCUS "; if(s.marked) st += "🎯MARK ";
                if(s.stunned) st += "💫STUNNED ";
                document.getElementById(`status-${p}`).innerText = st;

                const enBox = document.getElementById(`en-${p}`); enBox.innerHTML = '';
                for(let i=0; i<10; i++) { const dot = document.createElement('div'); dot.className = `en-dot ${i < s.en ? 'active' : ''}`; enBox.appendChild(dot); }
                
                if(s.job) {
                    jobs[s.job].skills.forEach((sk, i) => {
                        const btn = document.getElementById(`btn-${p}-${i}`);
                        if(!btn) return;
                        let displayCost = sk.c;
                        let costColor = "var(--info)";
                        if(s.frost && displayCost > 0) { displayCost *= 2; costColor = "var(--dmg)"; }
                        
                        btn.innerHTML = `<span class="sk-name">${sk.n}</span>
                        <span class="sk-cost" style="color:${costColor}">cost: ${displayCost}</span>
                        <span class="sk-val">${sk.d?sk.d[0]+'-'+sk.d[1]:(sk.v? (Array.isArray(sk.v)?sk.v[0]+'-'+sk.v[1]:'+'+sk.v) :'')}</span>
                        <span class="sk-effect">${sk.e}</span>`;
                        
                        // Cost Logic for Dimming
                        const canAfford = s.en >= displayCost;
                        btn.disabled = !canAfford; 
                        
                        // UI Styling: Dim if can't afford, Fade if stunned
                        if(!canAfford) {
                            btn.style.filter = "brightness(0.35) grayscale(0.5)";
                            btn.style.opacity = "0.7";
                        } else {
                            btn.style.filter = "none";
                            btn.style.opacity = s.stunned ? "0.6" : "1";
                        }
                    });
                }
            });
        }

        function pop(t, m, c, hitIndex = 0) {
            const el = document.createElement('div'); el.className = 'dmg-float'; el.innerText = m; el.style.color = `var(${c})`;
            const baseLeft = 40; const baseTop = 25; const horizontalStep = 10; const verticalStep = 5; const jitter = (Math.random() * 10) - 5;
            el.style.left = (baseLeft + (hitIndex * horizontalStep) + jitter) + "%";
            el.style.top = (baseTop - (hitIndex * verticalStep)) + "%";
            document.getElementById(`card-${t}`).appendChild(el); 
            setTimeout(() => el.remove(), 800);
        }

        function checkWin() {
            let w = state.boy.hp <= 0 ? 'GIRL' : (state.girl.hp <= 0 ? 'BOY' : null);
            if(w) { isOver = true; document.getElementById('win-title').innerText = `${w} WINS!`; document.getElementById('win-overlay').style.display = 'flex'; return true; }
            return false;
        }

        function r(min, max) { return Math.floor(Math.random()*(max-min+1))+min; }
        initSelection();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chrono Arena RPG</title>
    <style>
        :root { 
            --boy: #00d2ff; --girl: #ff007f; --accent: #f1c40f; 
            --bg: #0a0b16; --card-bg: rgba(25, 28, 45, 0.95);
            --event: #ff9f43; --heal: #2ecc71; --info: #00ffcc; --dmg: #ff4d4d;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg); color: white; margin: 0; padding: 0;
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 特效層 */
        #fx-layer { position: absolute; inset: 0; pointer-events: none; z-index: 800; overflow: hidden; }
        .fx-slash { position: absolute; width: 150px; height: 6px; background: white; box-shadow: 0 0 15px white; animation: slash 0.3s ease-out forwards; }
        @keyframes slash { 0% { transform: scaleX(0) rotate(-45deg); opacity: 1; } 100% { transform: scaleX(1.5) rotate(-45deg); opacity: 0; } }
        
        .fx-bolt { position: absolute; width: 30px; height: 30px; background: #a29bfe; border-radius: 50%; box-shadow: 0 0 25px #6c5ce7; animation: bolt 0.4s ease-out forwards; }
        @keyframes bolt { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(3.5); opacity: 0; } }

        .fx-arrow { position: absolute; font-size: 2rem; z-index: 850; animation: arrowFly 0.3s linear forwards; }
        @keyframes arrowFly { 0% { transform: translate(var(--sx), var(--sy)) rotate(var(--rot)); opacity: 1; } 100% { transform: translate(var(--ex), var(--ey)) rotate(var(--rot)); opacity: 0; } }

        .shake { animation: shake 0.2s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(6px, 6px); } 50% { transform: translate(-6px, -6px); } 75% { transform: translate(6px, -6px); } }

        #selection-screen { position: absolute; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        .job-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 850px; padding-bottom: 40px; }
        .job-card { background: var(--card-bg); border: 2px solid #444; padding: 18px; border-radius: 20px; text-align: left; }
        .job-card h3 { color: var(--accent); margin: 0 0 10px 0; font-size: 1.4rem; text-align: center; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .job-stats { font-size: 0.85rem; color: var(--info); margin-bottom: 12px; font-weight: bold; text-align: center; }
        .job-desc { font-size: 0.75rem; color: #bbb; line-height: 1.5; margin: 0; padding-left: 10px; list-style: none; position: relative; }
        .job-desc li::before { content: "▸"; position: absolute; left: -10px; color: var(--accent); }

        .arena { display: none; width: 100%; height: 100%; padding: 10px; gap: 10px; padding-top: 50px; }
        .card { flex: 1; background: var(--card-bg); border-radius: 20px; padding: 10px; display: flex; flex-direction: column; position: relative; border: 1px solid #333; overflow: hidden; }
        .hp-container { width: 100%; height: 22px; background: #000; border-radius: 10px; overflow: hidden; position: relative; margin: 3px 0; border: 1px solid #444; }
        .hp-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #ff4d4d, #f9ca24); transition: 0.3s; }
        .hp-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; text-shadow: 1px 1px 2px #000; }
        
        .en-row { display: flex; gap: 3px; justify-content: center; margin-bottom: 8px; }
        .en-dot { width: 10px; height: 10px; border-radius: 50%; background: #222; border: 1px solid #444; }
        .en-dot.active { background: var(--accent); box-shadow: 0 0 5px var(--accent); }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; flex-grow: 1; }
        button { 
            background: #2a2d3e; color: white; border: 1px solid #444; border-radius: 10px; 
            padding: 4px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 60px; transition: filter 0.2s, opacity 0.2s;
        }
        button:disabled { filter: brightness(0.3) grayscale(0.8); opacity: 0.6; cursor: not-allowed; }

        .btn-ult { grid-column: span 2; background: linear-gradient(45deg, #4834d4, #686de0); border: 1px solid #a29bfe; }
        .sk-name { font-size: 0.75rem; font-weight: 800; color: #fff; }
        .sk-cost { font-size: 0.65rem; color: var(--info); font-weight: bold; }
        .sk-val { font-size: 0.65rem; color: var(--dmg); font-weight: bold; }
        .sk-effect { font-size: 0.55rem; color: #aaa; text-align: center; line-height: 1; margin-top: 2px; }

        .dmg-float { position: absolute; font-weight: 900; pointer-events: none; animation: pop 0.8s ease-out forwards; z-index: 900; font-size: 2.2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        @keyframes pop { 0% { opacity: 0; transform: translateY(0) scale(0.5); } 20% { opacity: 1; transform: translateY(-20px) scale(1.1); } 100% { opacity: 0; transform: translateY(-100px) scale(1); } }
        
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        @media (max-width: 768px) { .arena { flex-direction: column; } .card { height: 49.5%; } .job-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="fx-layer"></div>

    <div id="selection-screen">
        <h1 style="color: var(--accent); margin-top: 20px;">CHRONO ARENA</h1>
        <p id="turn-title" style="color: var(--boy); font-weight: bold; margin-bottom: 20px;">BOY: SELECT YOUR CLASS</p>
        <div class="job-grid" id="job-list"></div>
    </div>

    <div class="arena" id="arena">
        <div id="card-boy" class="card">
            <h2 id="name-boy" style="color:var(--boy); text-align:center; margin:0; font-size: 1.1rem;">BOY</h2>
            <div id="status-boy" style="font-size:0.65rem; color:var(--accent); height:14px; text-align:center;"></div>
            <div class="hp-container"><div id="bar-boy" class="hp-fill"></div><div class="hp-text" id="txt-boy"></div></div>
            <div id="en-boy" class="en-row"></div>
            <div class="btn-grid" id="btns-boy"></div>
        </div>
        <div id="card-girl" class="card">
            <h2 id="name-girl" style="color:var(--girl); text-align:center; margin:0; font-size: 1.1rem;">GIRL</h2>
            <div id="status-girl" style="font-size:0.65rem; color:var(--accent); height:14px; text-align:center;"></div>
            <div class="hp-container"><div id="bar-girl" class="hp-fill"></div><div class="hp-text" id="txt-girl"></div></div>
            <div id="en-girl" class="en-row"></div>
            <div class="btn-grid" id="btns-girl"></div>
        </div>
    </div>

    <div id="win-overlay" class="overlay"><h1 id="win-title" style="font-size:4rem; color:var(--accent);"></h1><button onclick="location.reload()" style="padding:15px 50px; border-radius:50px; background:white; color:black; font-weight:bold; border:none;">REMATCH</button></div>

    <script>
        // 音效系統
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            if(type === 'slash') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(1000, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
                gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(); osc.stop(now + 0.1);
            } else if(type === 'bolt') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.2);
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(); osc.stop(now + 0.2);
            } else if(type === 'arrow') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(800, now);
                osc.frequency.linearRampToValueAtTime(1200, now + 0.05);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.05);
                osc.start(); osc.stop(now + 0.05);
            } else if(type === 'heal' || type === 'en') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, now);
                osc.frequency.linearRampToValueAtTime(1046.5, now + 0.3);
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            } else if(type === 'shake') {
                osc.type = 'square'; osc.frequency.setValueAtTime(60, now);
                osc.frequency.exponentialRampToValueAtTime(30, now + 0.4);
                gain.gain.setValueAtTime(0.4, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
                osc.start(); osc.stop(now + 0.4);
            }
        }

        let selecting = 'boy', isOver = false;
        const state = {
            boy: { hp:0, max:0, en:0, job:'', def:0, stunned:false, guard:false, reflect:false, dodge:0, weakened:false, frost:0, focused:false, marked:false },
            girl: { hp:0, max:0, en:0, job:'', def:0, stunned:false, guard:false, reflect:false, dodge:0, weakened:false, frost:0, focused:false, marked:false }
        };

        const jobs = {
            Warrior: { icon: "🛡️", hp: 150, def: 0.20, desc: ["Passive: EN gains when hit.", "Defensive: Guard breaks after hit.", "Ultimate: 100% Stun Target."], skills: [
                { n: "Strike", c: 0, d: [8, 12], fx: "slash", e: "Physical dmg" }, { n: "Charge", c: 0, v: 2, t: 'en', e: "+2 Energy" }, { n: "Shield Bash", c: 1, d: [10, 14], t: 'stun', v: 0.2, fx: "slash", e: "20% Stun Chance" }, { n: "War Cry", c: 2, t: 'weak', e: "Target hit -50%" }, { n: "Iron Guard", c: 1, t: 'def', e: "80% Block (Once)" }, { n: "Recover", c: 2, v: [25, 40], t: 'heal', e: "Heal HP" }, { n: "EARTHQUAKE", c: 9, d: [70, 95], t: 'stun', v: 1.0, fx: "shake", e: "DMG + 100% STUN" }
            ]},
            Mage: { icon: "🔮", hp: 95, def: 0, desc: ["Passive: EN efficiency.", "Control: Freeze costs EN.", "Ultimate: Deep Freeze (x3 cost)."], skills: [
                { n: "Magic Bolt", c: 0, d: [10, 15], fx: "bolt", e: "Arcane dmg" }, { n: "Meditate", c: 0, v: 3, t: 'en', e: "+3 Energy" }, { n: "Life Siphon", c: 2, d: [18, 28], t: 'leech', fx: "bolt", e: "100% Lifesteal" }, { n: "Frostbite", c: 2, d: [14, 22], t: 'frost', v: 1, fx: "bolt", e: "Dmg + Frost (x2)" }, { n: "Mirror Feedback", c: 2, t: 'reflect', e: "100% Reflect (Once)" }, { n: "Mana Burn", c: 2, d: [12, 18], t: 'burn', fx: "bolt", e: "DMG + Drain 2 EN" }, { n: "METEOR", c: 9, d: [105, 130], t: 'frost', v: 2, fx: "shake", e: "DMG + DEEP FREEZE" }
            ]},
            Berserker: { icon: "🪓", hp: 130, def: 0.1, desc: ["Passive: Crit 30% / Hit: Loss 1 EN.", "Slayer: Execute low HP.", "Ultimate: Heal + Refund EN."], skills: [
                { n: "Heavy Slash", c: 0, d: [13, 19], fx: "slash", e: "Brutal swing" }, { n: "Blood Lust", c: 0, v: 2, t: 'en', e: "+2 Energy" }, { n: "Adrenaline", c: 2, t: 'focus', e: "Next hit 100% Crit" }, { n: "Frenzy", c: 3, d: [25, 38], t: 'leech', v: 0.5, fx: "slash", e: "50% Lifesteal" }, { n: "Execute", c: 4, d: [30, 45], t: 'exec', fx: "slash", e: "+50% dmg if <50%HP" }, { n: "Inner Rage", c: 1, v: [15, 25], t: 'heal', e: "Self Heal" }, { n: "DECIMATE", c: 9, d: [95, 120], t: 'berserk_ult', fx: "shake", e: "Leech + FULL EN" }
            ]},
            Archer: { icon: "🏹", hp: 110, def: 0.15, desc: ["Passive: Rapid Double Hit.", "Agility: Evasion.", "Ultimate: 4-Hit + Pierce."], skills: [
                { n: "Aim Shot", c: 0, d: [11, 15], fx: "arrow", e: "Pierce dmg" }, { n: "Reload", c: 0, v: 2, t: 'en', e: "+2 Energy" }, { n: "Quick Shot", c: 1, d: [10, 14], t: 'double', fx: "arrow", e: "Double Hit" }, { n: "Mark Target", c: 2, t: 'mark', e: "Ignore Defense" }, { n: "Evasion", c: 1, t: 'dodge', e: "100% Dodge (2 Acts)" }, { n: "Volley", c: 3, d: [15, 22], t: 'triple', fx: "arrow", e: "Triple Strike" }, { n: "ARROW RAIN", c: 9, d: [25, 35], t: 'archer_ult', fx: "arrow", e: "4x DMG + MARKED" }
            ]}
        };

        function triggerFX(type, attacker, target) {
            playSfx(type); // 觸發音效
            const layer = document.getElementById('fx-layer');
            const targetRect = document.getElementById(`card-${target}`).getBoundingClientRect();
            const attackerRect = document.getElementById(`card-${attacker}`).getBoundingClientRect();
            const tx = targetRect.left + targetRect.width/2;
            const ty = targetRect.top + targetRect.height/2;

            if(type === 'slash') {
                const fx = document.createElement('div'); fx.className = 'fx-slash';
                fx.style.left = (tx - 75) + 'px'; fx.style.top = ty + 'px';
                layer.appendChild(fx); setTimeout(() => fx.remove(), 300);
            } else if(type === 'bolt') {
                const fx = document.createElement('div'); fx.className = 'fx-bolt';
                fx.style.left = (tx - 15) + 'px'; fx.style.top = (ty - 15) + 'px';
                layer.appendChild(fx); setTimeout(() => fx.remove(), 400);
            } else if(type === 'arrow') {
                const fx = document.createElement('div'); fx.className = 'fx-arrow'; fx.innerText = '🏹';
                fx.style.setProperty('--sx', (attackerRect.left + 50) + 'px'); fx.style.setProperty('--sy', (attackerRect.top + 50) + 'px');
                fx.style.setProperty('--ex', tx + 'px'); fx.style.setProperty('--ey', ty + 'px');
                fx.style.setProperty('--rot', attacker === 'boy' ? '45deg' : '-135deg');
                layer.appendChild(fx); setTimeout(() => fx.remove(), 300);
            } else if(type === 'shake') {
                document.body.classList.add('shake'); setTimeout(() => document.body.classList.remove('shake'), 200);
            }
        }

        function act(p, i) {
            if(isOver) return;
            if(state[p].stunned) { state[p].stunned = false; pop(p, "STUNNED!", "var(--dmg)"); update(); return; }
            const s = jobs[state[p].job].skills[i], opp = p === 'boy' ? 'girl' : 'boy';
            let cost = (state[p].frost > 0 && s.c > 0) ? s.c * (state[p].frost === 2 ? 3 : 2) : s.c;
            if(state[p].en < cost) return;
            state[p].en -= cost;
            if(cost > 0) state[p].frost = 0;
            state[p].reflect = false;

            if(s.t === 'en') { playSfx('en'); state[p].en = Math.min(10, state[p].en + s.v); }
            else if(s.t === 'heal') { playSfx('heal'); let h = r(s.v[0], s.v[1]); state[p].hp = Math.min(state[p].max, state[p].hp + h); pop(p, `+${h}`, 'var(--heal)'); }
            else if(s.t === 'def' || s.t === 'reflect' || s.t === 'dodge' || s.t === 'weak' || s.t === 'focus' || s.t === 'mark') { playSfx('bolt'); if(s.t==='def') state[p].guard=true; if(s.t==='reflect') state[p].reflect=true; if(s.t==='dodge') state[p].dodge=2; if(s.t==='weak') state[opp].weakened=true; if(s.t==='focus') state[p].focused=true; if(s.t==='mark') state[opp].marked=true; }
            else {
                if(s.t === 'burn') state[opp].en = Math.max(0, state[opp].en - 2);
                let hits = s.t==='double'?2:(s.t==='triple'?3:(s.t==='archer_ult'?4:1));
                
                for(let h=0; h<hits; h++){
                    setTimeout(() => {
                        if(state.boy.hp <= 0 || state.girl.hp <= 0) return;
                        if(s.fx) triggerFX(s.fx, p, opp);
                        if(state[opp].dodge > 0) { pop(opp, "MISS", "#3498db", h); } 
                        else {
                            let baseD = r(s.d[0], s.d[1]);
                            if(s.t==='exec' && state[opp].hp < (state[opp].max*0.5)) baseD *= 1.5;
                            if(state[p].focused || Math.random() < (state[p].job==='Berserker'?0.3:0.12)) { baseD *= 2; state[p].focused = false; }
                            let red = state[opp].marked ? 0 : (state[opp].guard ? 0.8 : state[opp].def);
                            if(state[opp].reflect) { state[p].hp -= baseD; pop(p, `-${Math.floor(baseD)}`, "var(--dmg)", h); red = 0.5; state[opp].reflect = false; }
                            let f = Math.max(1, Math.floor(baseD * (1 - red)));
                            state[opp].hp -= f; pop(opp, `-${f}`, "var(--dmg)", h);
                            if(state[opp].guard) state[opp].guard = false;
                            if(s.t === 'stun' && Math.random() <= s.v) state[opp].stunned = true;
                            if(s.t === 'frost') state[opp].frost = s.v;
                            if(state[opp].job === 'Warrior') state[opp].en = Math.min(10, state[opp].en + 1);
                            if(state[opp].job === 'Berserker') state[opp].en = Math.max(0, state[opp].en - 1);
                        }
                        update(); checkWin();
                        if(h === hits-1 && state[opp].dodge > 0) state[opp].dodge--;
                    }, h * 180);
                }
            }
            update();
        }

        function update() {
            ['boy','girl'].forEach(p => {
                const s = state[p]; s.hp = Math.max(0, Math.min(s.max, s.hp)); 
                document.getElementById(`txt-${p}`).innerText = `${Math.floor(s.hp)}/${s.max}`;
                document.getElementById(`bar-${p}`).style.width = (s.hp/s.max*100) + "%";
                document.getElementById(`status-${p}`).innerText = (s.guard?"🛡️G ":"")+(s.reflect?"✨R ":"")+(s.dodge>0?`💨E(${s.dodge}) `:"")+(s.frost>0?"❄️F ":"")+(s.stunned?"💫S ":"");
                const enBox = document.getElementById(`en-${p}`); enBox.innerHTML = '';
                for(let i=0; i<10; i++) { const d = document.createElement('div'); d.className = `en-dot ${i < s.en ? 'active' : ''}`; enBox.appendChild(d); }
                if(s.job) {
                    document.getElementById(`name-${p}`).innerText = `${p.toUpperCase()} (${jobs[s.job].icon})`;
                    const box = document.getElementById(`btns-${p}`); box.innerHTML = '';
                    jobs[s.job].skills.forEach((sk, idx) => {
                        const b = document.createElement('button'); if(idx === 6) b.className = 'btn-ult';
                        let cost = (s.frost > 0 && sk.c > 0) ? sk.c * (s.frost === 2 ? 3 : 2) : sk.c;
                        b.disabled = s.en < cost || isOver;
                        b.innerHTML = `<span class="sk-name">${sk.n}</span><span class="sk-cost">EN: ${cost}</span><span class="sk-val">${sk.d?sk.d[0]+'-'+sk.d[1]:(sk.v?'+'+sk.v:'')}</span><span class="sk-effect">${sk.e}</span>`;
                        b.onclick = () => act(p, idx); box.appendChild(b);
                    });
                }
            });
        }

        function pop(t, m, c, hI = 0) {
            const el = document.createElement('div'); el.className = 'dmg-float'; el.innerText = m; el.style.color = c;
            el.style.left = (40 + (hI * 10)) + "%"; el.style.top = "25%";
            document.getElementById(`card-${t}`).appendChild(el); setTimeout(() => el.remove(), 800);
        }

        function initSelection() {
            const list = document.getElementById('job-list');
            for(let j in jobs) {
                const card = document.createElement('div'); card.className = 'job-card'; card.onclick = () => { if(audioCtx.state === 'suspended') audioCtx.resume(); pick(j); };
                card.innerHTML = `<h3>${jobs[j].icon} ${j.toUpperCase()}</h3><div class="job-stats">HP: ${jobs[j].hp} | DEF: ${jobs[j].def*100}%</div><ul class="job-desc">${jobs[j].desc.map(d => `<li>${d}</li>`).join('')}</ul>`;
                list.appendChild(card);
            }
        }

        function pick(j) {
            state[selecting].job = j; state[selecting].max = jobs[j].hp; state[selecting].hp = jobs[j].hp; state[selecting].def = jobs[j].def;
            if(selecting === 'boy') { selecting = 'girl'; document.getElementById('turn-title').innerText = "GIRL: SELECT YOUR CLASS"; document.getElementById('turn-title').style.color = "var(--girl)"; }
            else { document.getElementById('selection-screen').style.display = 'none'; document.getElementById('arena').style.display = 'flex'; update(); }
        }

        function checkWin() {
            let w = state.boy.hp <= 0 ? 'GIRL' : (state.girl.hp <= 0 ? 'BOY' : null);
            if(w && !isOver) { isOver = true; document.getElementById('win-title').innerText = `${w} WINS!`; document.getElementById('win-overlay').style.display = 'flex'; playSfx('shake'); return true; }
            return false;
        }

        function r(min, max) { return Math.floor(Math.random()*(max-min+1))+min; }
        initSelection();
    </script>
</body>
</html>
